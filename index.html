<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WüBot – Die besten Outtakes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page">

    <header class="page-header">
      <p class="eyebrow">Chatbot-Studie · Bonus-Material</p>
      <h1>WüBot – Die besten Outtakes</h1>
      <p class="intro">
        Auch der WüBot hatte seine besonderen Momente. Entdecken Sie einige der witzigsten Dialoge aus unserer Studie.
      </p>
    </header>

    <section class="reel" aria-label="Outtake-Anzeige">

      <div class="reel-strip" aria-hidden="true"></div>

      <div class="chat-window">
        <div class="chat-header">
          <div class="chat-avatar">
            <img src="wuebot-avatar.png" alt="WüBot Avatar"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <span class="avatar-fallback">Wü</span>
          </div>
          <div class="chat-title">
            <span class="chat-name">WüBot</span>
            <span class="chat-status" id="chatStatus">Outtake wird geladen …</span>
          </div>
          <div class="chat-badge" id="outtakeBadge">1/10</div>
        </div>

        <div class="chat-messages" id="chatMessages">
          <!-- Nachrichten werden per JavaScript eingefügt -->
        </div>
      </div>

      <nav class="reel-controls" aria-label="Outtake-Navigation">
        <button type="button" id="prevBtn" class="nav-btn" aria-label="Vorheriges Outtake">
          <span aria-hidden="true">←</span> Zurück
        </button>

        <div class="dots" id="dots"></div>

        <button type="button" id="nextBtn" class="nav-btn" aria-label="Nächstes Outtake">
          Weiter <span aria-hidden="true">→</span>
        </button>
      </nav>

      <p class="outtake-title" id="outtakeTitle"></p>

    </section>

    <footer class="page-footer">
      <p>Ergänzendes Material zur Präsentation der Studienergebnisse.</p>
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
